name: fixitlog
description: "A maintenance tracking Flutter app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  lottie: ^2.7.0
  shared_preferences: ^2.3.4
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  rename: ^3.1.0
  rename_app: ^1.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/success.json
