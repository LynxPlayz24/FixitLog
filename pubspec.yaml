name: fixitlog
description: "A maintenance tracking Flutter app."
publish_to: 'none'

version: 1.1.0+2

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  lottie: ^2.7.0
  shared_preferences: ^2.3.4
  csv: ^6.0.0
  pdf: ^3.11.1
  printing: ^5.13.3
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  share_plus: ^12.0.2
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  rename: ^3.1.0
  rename_app: ^1.6.5
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/success.json
